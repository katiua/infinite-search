name: Build Extension

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create ZIP
        run: |
          cd dist
          zip -r ../infinite-search-${{ github.event.release.tag_name }}.zip .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            infinite-search-${{ github.event.release.tag_name }}.zip
